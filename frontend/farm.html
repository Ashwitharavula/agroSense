<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSense - My Farms</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <a href="dashboard.html" class="nav-brand">AgroSense 🌱</a>
    <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="farm.html" class="active">My Farms</a>
        <a href="history.html">History</a>
        <a href="fertilizers.html">Fertilizer Guide</a>
        <a href="#" class="btn-logout" id="logoutBtn">Logout</a>
    </div>
</nav>

<main class="main-content">
    <div class="dashboard-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
        <div>
            <h1>My Farms</h1>
            <p>Manage your registered farming plots and analyze their soil health.</p>
        </div>
        <button class="btn" style="width: auto; padding: 12px 24px;" id="openAddFarmModalBtn">
            ➕ Register New Farm
        </button>
    </div>

    <!-- Farms Grid -->
    <div class="farms-grid" id="farmsList">
        <div class="empty-state">
            <div class="empty-state-icon">🚜</div>
            <p>Loading your registered plots...</p>
        </div>
    </div>
</main>

<!-- Add Farm Modal Overlay -->
<div class="modal-overlay" id="addFarmModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 style="margin: 0; color: var(--primary-hover);">Register New Farm</h2>
            <button class="modal-close" id="closeAddFarmModalBtn">&times;</button>
        </div>
        <form id="addFarmForm">
            <div class="form-group">
                <label for="farmName">Farm Name</label>
                <input type="text" id="farmName" class="input-control" placeholder="e.g. North Fields" required>
            </div>
            
            <div class="form-group">
                <label for="farmLocation">Location / Region</label>
                <input type="text" id="farmLocation" class="input-control" placeholder="e.g. Punjab, India" required>
            </div>

            <h3 style="font-size: 16px; margin: 20px 0 10px 0; color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 5px;">Soil Nutrients & pH</h3>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label for="soilPH">Soil pH (0-14)</label>
                    <input type="number" step="0.1" min="0" max="14" id="soilPH" class="input-control" placeholder="e.g. 6.5" required>
                </div>
                
                <div class="form-group">
                    <label for="nitrogen">Nitrogen (N)</label>
                    <input type="number" min="0" id="nitrogen" class="input-control" placeholder="mg/kg (e.g. 55)" required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label for="phosphorus">Phosphorus (P)</label>
                    <input type="number" min="0" id="phosphorus" class="input-control" placeholder="mg/kg (e.g. 45)" required>
                </div>
                
                <div class="form-group">
                    <label for="potassium">Potassium (K)</label>
                    <input type="number" min="0" id="potassium" class="input-control" placeholder="mg/kg (e.g. 35)" required>
                </div>
            </div>

            <button type="submit" class="btn" style="margin-top: 15px;">
                Register Farm Plot
            </button>
        </form>
    </div>
</div>

<script src="js/app.js"></script>

</body>
</html>
