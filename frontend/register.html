<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSense - Create Account</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-auth">
    <div class="auth-card">
        <h1>AgroSense 🌱</h1>
        <h2>Join Smart Farming</h2>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input 
                    type="text" 
                    id="name" 
                    class="input-control" 
                    placeholder="Enter your full name" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    class="input-control" 
                    placeholder="Enter your email" 
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    class="input-control" 
                    placeholder="Create a password" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="language">Preferred Language</label>
                <select id="language" class="input-control">
                    <option value="English">English</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Spanish">Spanish</option>
                    <option value="French">French</option>
                </select>
            </div>
            
            <button type="submit" class="btn" style="margin-top: 10px;">
                Create Account
            </button>
        </form>
        
        <p class="mt-4" style="font-size: 15px; color: var(--text-secondary);">
            Already have an account? 
            <a href="login.html" style="color: var(--primary-hover); font-weight: 600; text-decoration: none;">Login here</a>
        </p>
    </div>
</div>

<script src="js/app.js"></script>

</body>
</html>
