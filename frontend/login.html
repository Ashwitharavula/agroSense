<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSense - Secure Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-auth">
    <div class="auth-card">
        <h1>AgroSense 🌱</h1>
        <h2>Smart Farming Companion</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    class="input-control" 
                    placeholder="Enter your email" 
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    class="input-control" 
                    placeholder="Enter your password" 
                    required
                >
            </div>
            
            <button type="submit" class="btn" style="margin-top: 10px;">
                Login to Dashboard
            </button>
        </form>
        
        <p class="mt-4" style="font-size: 15px; color: var(--text-secondary);">
            Don't have an account? 
            <a href="register.html" style="color: var(--primary-hover); font-weight: 600; text-decoration: none;">Register here</a>
        </p>
    </div>
</div>

<script src="js/app.js"></script>

</body>
</html>
